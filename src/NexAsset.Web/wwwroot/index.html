<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexAsset - Enterprise Asset Management</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@1.23.0/font/lucide.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="NexAsset.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        function translateIcons(element) {
            if (!element) return;
            if (element.tagName === 'I') {
                const classList = Array.from(element.classList);
                classList.forEach((cls) => {
                    if (cls.startsWith('lucide-') && !element.classList.contains(cls.replace('lucide-', 'icon-'))) {
                        element.classList.add(cls.replace('lucide-', 'icon-'));
                    }
                });
            }
            const icons = element.querySelectorAll('i');
            icons.forEach((icon) => {
                const classList = Array.from(icon.classList);
                classList.forEach((cls) => {
                    if (cls.startsWith('lucide-') && !icon.classList.contains(cls.replace('lucide-', 'icon-'))) {
                        icon.classList.add(cls.replace('lucide-', 'icon-'));
                    }
                });
            });
        }
        
        // Translate pre-existing items
        translateIcons(document.body);
        
        // Listen to DOM mutations for Blazor routing and navigation updates
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'childList') {
                    mutation.addedNodes.forEach((node) => {
                        if (node.nodeType === Node.ELEMENT_NODE) {
                            translateIcons(node);
                        }
                    });
                } else if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                    translateIcons(mutation.target);
                }
            });
        });
        observer.observe(document.body, { 
            childList: true, 
            subtree: true, 
            attributes: true, 
            attributeFilter: ['class'] 
        });
    </script>
</body>

</html>
